name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Build, test, vet, and format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            printf 'The following files are not gofmt-formatted:\n%s\n' "$files"
            exit 1
          fi

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Vet
        run: make vet
